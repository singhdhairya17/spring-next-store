spring.application.name=spring-next-store-api

# MySQL — set your own credentials (do not commit real passwords to public repos)
spring.h2.console.enabled=true
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce-db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD:changeme}

# Mapping context path
server.servlet.context-path=/

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.main.allow-circular-references=true

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
upload.path=uploads/
spring.web.resources.static-locations=file:uploads/
